# Regenerates the animated banner, the live strategy tracker (real SPY), the
# animated order book & Monte Carlo SVGs, and the research digest every morning,
# then commits them back — so the profile is never static.
name: profile

on:
  schedule:
    - cron: "17 13 * * *" # ~daily; offset off the hour so it isn't queued
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - assets/gen_banner.py
      - assets/gen_tracker.py
      - assets/gen_orderbook.py
      - assets/gen_montecarlo.py
      - assets/gen_digest.py
      - .github/workflows/profile.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quantsim
        run: pip install "git+https://github.com/hilothefunnydog123-coder/quantsim.git"

      - name: Regenerate banner
        run: python assets/gen_banner.py

      - name: Update strategy tracker (real SPY, falls back to sample)
        run: python assets/gen_tracker.py

      - name: Regenerate animated order book
        run: python assets/gen_orderbook.py

      - name: Regenerate Monte Carlo pricing animation
        run: python assets/gen_montecarlo.py

      - name: Refresh research digest from Neil Quant Labs
        run: python assets/gen_digest.py

      - name: Commit if changed
        run: |
          git config user.name "hilothefunnydog123-coder"
          git config user.email "229661712+hilothefunnydog123-coder@users.noreply.github.com"
          git add assets/banner.svg assets/equity.svg assets/orderbook.svg assets/montecarlo.svg README.md
          git diff --cached --quiet || git commit -m "chore: daily profile refresh"
          git push
